<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>Workout canvas — prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F5F4FA;--fg:#161229;--fg2:#5A5670;--faint:#908CA3;--border:#E4E2EE;--primary:#4A2EBD;--surface:#fff;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;min-height:100%;}
  body{background:var(--bg);color:var(--fg);font-family:'Manrope',system-ui,sans-serif;
       display:flex;flex-direction:column;align-items:center;justify-content:center;
       min-height:100dvh;padding:32px 22px;text-align:center;}
  h1{font-size:22px;font-weight:700;margin:0 0 6px;letter-spacing:-.01em;}
  p{font-size:14px;line-height:1.5;color:var(--fg2);margin:0 0 26px;max-width:340px;}
  .opts{display:flex;flex-direction:column;gap:12px;width:100%;max-width:320px;}
  a.opt{display:block;background:var(--surface);border:1px solid var(--border);border-radius:14px;
        padding:16px 18px;text-decoration:none;color:var(--fg);box-shadow:0 2px 10px rgba(13,11,22,.04);}
  a.opt b{display:block;font-size:16px;font-weight:700;color:var(--primary);margin-bottom:2px;}
  a.opt span{font-size:13px;color:var(--fg2);}
  .note{font-size:12px;color:var(--faint);margin-top:24px;max-width:320px;line-height:1.5;}
</style></head>
<body>
  <h1>Workout canvas</h1>
  <p>Two takes on the same in-workout surface. Open one on your phone and log a few sets.</p>
  <div class="opts">
    <a class="opt" href="prod-ledger.html"><b>Ledger →</b><span>Aligned name + sets, prose numbers</span></a>
    <a class="opt" href="prod-chips.html"><b>Chips →</b><span>Each set is a tappable token</span></a>
  </div>
  <div class="note">Prototype — taps & suggestions are real; voice is simulated. Best on a phone.</div>
</body></html>
